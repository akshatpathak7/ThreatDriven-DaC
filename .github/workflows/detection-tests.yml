name: Detection-as-Code Validation

on:
  push:
  pull_request:

jobs:
  validate-rules-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate rules and run tests
        run: pytest -q

      - name: Run sample pipeline
        run: python -m src.pipeline --logs data/logs/cloudtrail_suspicious.json
