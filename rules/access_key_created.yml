id: AWS-005
title: New Access Key Created
description: Detects IAM access key creation for a user.
logsource:
  product: aws
  service: iam
detection:
  selection:
    eventSource: iam.amazonaws.com
    eventName: CreateAccessKey
  condition: selection
severity: high
risk_score: 72
mitre_attack:
  - tactic: Persistence
    technique_id: T1098
    technique: Account Manipulation
  - tactic: Credential Access
    technique_id: T1552.005
    technique: Cloud Instance Metadata API
false_positive: Access keys may be created for legacy integrations, though long-lived keys should be minimized.
recommended_action: Confirm the key owner and purpose, rotate or disable suspicious keys, and prefer short-lived role credentials.

